name: Financial Heatmap Scraper

on:
  schedule:
    # This runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allows GitHub to save the Excel file back to your repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push Excel file
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Pull latest changes to avoid "fetch first" error
          git pull --rebase origin main
          
          git add Market_GEX_Heatmaps.xlsx
          # The '|| exit 0' prevents the script from failing if no data changed
          git commit -m "Update Heatmap Data: $(date)" || exit 0
          git push origin main
