name: Financial Heatmap Scraper

on:
  schedule:
    # This runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allows GitHub to save the Excel file back to your repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git pull --rebase origin main
          
          # IMPORTANT: Notice both files are listed here
          git add Market_GEX_Heatmaps.xlsx latest_data.csv
          
          git commit -m "Update Data: $(date)" || exit 0
          git push origin main
