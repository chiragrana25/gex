name: GEX Dashboard & AI Analysis

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to trigger it manually from the "Actions" tab

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install Chrome and Dependencies
        run: |
          pip install selenium requests webdriver-manager Pillow

      - name: Run GEX Scraper
        env:
          # Make sure this matches the Secret name in your GitHub Repo settings
          WEBAPP_URL: ${{ secrets.WEBAPP_URL }}
        run: python main.py

      - name: Upload Full Page Artifacts
        if: failure() # Only uploads if the script crashes, to help you debug
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: full_*.png
